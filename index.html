<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Build Your Top 5</title>
    <meta
      name="description"
      content="Build your top five picks for the 2026 NBA mock draft and learn more about the potential lottery names."
    >
    <link rel="icon" type="image/png" href="assets/images/all-nba-logo.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="masthead">
        <div class="masthead__brand">
          <img class="masthead__logo" src="assets/images/all-nba-logo.png" alt="All NBA">
          <h1>Build Your Top 5</h1>
        </div>
        <div class="masthead__actions">
          <button class="utility-button" id="export-board" type="button">Export PNG</button>
          <button class="utility-button utility-button--light" id="reset-board" type="button">Reset</button>
          <p class="masthead__status" id="board-status" role="status" aria-live="polite">
            Saved in this browser.
          </p>
        </div>
      </header>

      <main class="page-layout">
        <section class="board-panel" aria-labelledby="board-title">
          <div class="section-heading">
            <h2 id="board-title">Draft Board</h2>
          </div>
          <div class="draft-board" id="draft-board"></div>
        </section>

        <aside class="lottery-panel" aria-labelledby="lottery-title">
          <div class="section-heading">
            <h2 id="lottery-title">Get to know the potential lottery picks</h2>
            <p>5-minute draft profiles by ALLCITY's Draft Expert Will Gottlieb</p>
          </div>
          <ul class="lottery-links" id="lottery-links"></ul>
        </aside>
      </main>
    </div>

    <template id="pick-template">
      <article class="pick-card">
        <div class="pick-card__header">
          <div class="pick-card__badge"></div>
          <div class="pick-card__team">
            <img class="pick-card__logo" alt="">
            <div>
              <p class="pick-card__team-line"></p>
              <h3 class="pick-card__team-name"></h3>
            </div>
          </div>
        </div>

        <div class="pick-card__picker">
          <label class="pick-card__label">
            <span>Search players</span>
            <input
              class="pick-card__search"
              type="search"
              autocomplete="off"
              spellcheck="false"
              placeholder="Start typing a player name"
            >
          </label>
          <div class="pick-card__results" hidden></div>
        </div>

        <div class="player-card">
          <div class="player-card__photo-wrap">
            <div class="player-card__photo player-card__photo--placeholder"></div>
          </div>
          <div class="player-card__details">
            <div class="player-card__headline">
              <h4 class="player-card__name"></h4>
              <button class="player-card__clear" type="button">Clear</button>
            </div>
            <dl class="player-card__meta"></dl>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
